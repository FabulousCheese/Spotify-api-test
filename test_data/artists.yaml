endpoints:
- path: /artists/{id}
  method: GET
  operation_id: get-an-artist
  cases:
  - name: valid_case
    description: 正向：有效ID获取艺术家信息
    path_params:
      id: 0TnOYISbd1XYRBk9myaseg
    query_params: {}
    expect:
      status: 200
      body_fields:
      - id
      - name
      - type
      - uri
      body_types:
        id: string
        name: string
        type: string
        uri: string
  - name: missing_required
    description: 异常：缺少必填路径参数id
    path_params: {}
    query_params: {}
    expect:
      status:
      - 400
      - 403
      - 404
  - name: invalid_param
    description: 异常：无效的id值
    path_params:
      id: invalid_id_123
    query_params: {}
    expect:
      status:
      - 400
      - 403
      - 404
  - name: no_token
    description: 鉴权：无认证token
    skip_auth: true
    path_params:
      id: 0TnOYISbd1XYRBk9myaseg
    query_params: {}
    expect:
      status: 401
  - name: invalid_token
    description: 鉴权：无效token
    auth_header: Bearer invalid_token_12345
    path_params:
      id: 0TnOYISbd1XYRBk9myaseg
    query_params: {}
    expect:
      status: 401
- path: /artists
  method: GET
  operation_id: get-multiple-artists
  cases:
